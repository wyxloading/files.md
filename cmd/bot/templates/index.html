<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://files.md/favicon.ico" sizes="32x32">
    <link rel="stylesheet" href="styles.css" type="text/css">
    <title>Files.md</title>
</head>
<body>
<main>
    <article>
        <heading>
            <h1>Let's be lazy</h1>
        </heading>
        <content>
            <p>No <em>productivity</em>, no <em>planning</em>. Relax.</p>
            <p>The only thing that matters is your calmness.</p>
            <p>Your energy drains when you keep <em>stuff</em> in your head.</p>
            <p>
                <span class="muted">What stuff?</span>
            <ul>
                <li>Thoughts and ideas</li>
                <li>Tasks you need to do</li>
                <li>Items to buy</li>
                <li>Emotions</li>
            </ul>
            </p>
            <p>All that we can dump to plain text files.</p>
        </content>
    </article>
</main>
<script src="/index.js"></script>
</body>
</html>
