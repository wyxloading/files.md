<!DOCTYPE html>

<body>
<script>
    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open('chat', 1);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => resolve(request.result);
            request.onupgradeneeded = () => {
                const db = request.result;
                if (!db.objectStoreNames.contains('handles')) {
                    db.createObjectStore('handles');
                }
            };
        });
    }

    async function openDir() {
        let dirHandle = await window.showDirectoryPicker();
        await saveDirectoryHandle(dirHandle);
        await dirHandle.getFileHandle('test.txt', {
            create: true
        });
    }

    async function getRootDirHandle() {
        const db = await initDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction('handles', 'readonly');
            const store = transaction.objectStore('handles');
            const request = store.get('savedDirectoryHandle');
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    async function saveDirectoryHandle(directoryHandle) {
        const db = await initDB();
        const transaction = db.transaction('handles', 'readwrite');
        const store = transaction.objectStore('handles');
        await store.put(directoryHandle, 'savedDirectoryHandle');
    }

    async function read(args) {
        let path = args[0];
        const root = await getRootDirHandle();
        if (root === undefined) {
            console.error("please open dir");
        }
        let fileHandle = await root.getFileHandle('path');
        let file = await fileHandle.getFile();

        return await file.text();
    }

    async function write(args) {
        let path = args[0];
        let content = args[1];

        const root = await getRootDirHandle();
        if (root === undefined) {
            console.error("please open dir");
        }
        let fileHandle = await root.getFileHandle('path');
        if (fileHandle === null) {
            throw new Error("Invalid file name");
        }

        const writable = await fileHandle.createWritable();
        await writable.write(content);
        await writable.close();
    }

    async function exists(args) {
        let path = args[0]
        if (path === "") {
            return true
        }

        try {
            const root = await getRootDirHandle();
            if (root === undefined) {
                return false;
            }

            await root.getFileHandle(path);
            return true;
        } catch (error) {
            if (error.name === 'NotFoundError') {
                return false
            }
            // TODO better way to handle dirs
            if (error.name === 'TypeMismatchError') {
                return true;
            }
            console.log("EXISTS:", error, "PATH: ", path);
            throw error
        }
    }

    async function mkdir(args) {
        let path = args[0];
        console.log(path);
        try {
            let currentDirHandle = await getRootDirHandle();
            await currentDirHandle.getDirectoryHandle(path, {create: true});
        } catch (error) {
            console.log(error);
            throw error;
        }
    }

    async function mkdirAll(args) {
        let path = args[0]
        const dirs = path.split('/');
        let currentDirHandle = await getRootDirHandle();
        for (const dirName of dirs) {
            if (dirName) {
               await mkdir([path])
            }
        }
    }

    function receive(val) {
        console.log(val);
    }

</script>
<script type="module">

    const go = new Go();
    const wasmFile = await fetch("main.wasm");
    const wasmModule = await WebAssembly.instantiateStreaming(wasmFile, go.importObject);
    go.run(wasmModule.instance);
    console.log(reply('file.md'));
</script>
