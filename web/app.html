<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Files.md (Alpha version)</title>
    <link rel="canonical" href="https://app.files.md/">
    <link rel="icon" href="favicon.ico" sizes="32x32">
    <link rel="manifest" href="manifest.json">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link href="app.css" rel="stylesheet">
    <link href="lib/normalize.css" rel="stylesheet">
    <link href="lib/tree.css" rel="stylesheet" >
    <link href="lib/codemirror.css" rel="stylesheet" >
    <link href="lib/hypermd.css" rel="stylesheet" >
    <link href="lib/hypermd-light.css" rel="stylesheet" >
    <script src="lib/tree.js"></script>
    <script src="lib/codemirror.js"></script>
    <script src="lib/core.js"></script>
    <script src="lib/markdown.js"></script>
    <script src="lib/hypermd.js"></script>
    <script src="lib/click.js"></script>
    <script src="lib/hide-token.js"></script>
    <script src="lib/fold.js"></script>
    <script src="lib/fold-image.js"></script>
    <script src="lib/fold-link.js"></script>
    <script src="lib/table-align.js"></script>
    <script src="lib/autocomplete-link.js"></script>
    <script src="lib/show-hint.js"></script>
    <script src="lib/autoscroll.js"></script>
    <script src="lib/codemirror-go.js"></script>
    <script src="lib/codemirror-php.js"></script>
    <script src="lib/codemirror-shell.js"></script>
    <script src="lib/similarity.js"></script>
    <script src="welcome.js"></script>
    <script src="files.js"></script>
</head>
<body>

<div id="sidebar">
    <div id="sidebar-toolbar">
        <button id="new-file" title="New file">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 32 32">
                <path stroke="#535358" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 25V7M7 16h18"/>
            </svg>
        </button>
        <button id="new-folder" title="New folder">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 32 32">
                <path stroke="#535358" stroke-linecap="round" stroke-width="2" d="M28 11v13a2 2 0 01-2 2H6a2 2 0 01-2-2V8a2 2 0 012-2h6c3 0 3 3 5 3h9.003C27.108 9 28 9.895 28 11z"/>
                <path stroke="#535358" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 21v-8M12 17h8"/>
            </svg>
        </button>
        <button id="open-folder" title="Select local folder" onClick="openDir()">
            Open or create folder
        </button>
    </div>
   <div id="sidebar-tree">
   </div>
</div>
<div id="content">
    <textarea id="editor"></textarea>
</div>
<div id="search" style="display: none;">
    <form autocomplete="off">
        <input type="text" id="search-input" placeholder="Go to file..." oninput="search()">
    </form>
    <ul id="search-results"></ul>
</div>
<div id="move" style="display: none;">
    <form autocomplete="off">
        <input type="text" id="move-input" placeholder="Move to folder..." oninput="suggestMove()">
    </form>
    <ul id="move-results"></ul>
</div>
<div id="welcome"><p>100% local, we don't process your files: <button onClick="openDir()" id="openDirectory">Open directory with *.md files</button></p></div>
<script src="app.js"></script>
<script>
    init(document.getElementById("editor"));
</script>
</body>
</html>
